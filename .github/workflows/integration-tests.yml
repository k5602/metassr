name: Integration Tests

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  DOCKER_BUILDKIT: 1

jobs:
  bundler-tests:
    name: Bundler Integration Tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        build-type: [debug, release]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run bundler tests in Docker
        run: docker build --target integration_test_${{ matrix.build-type }} -f Dockerfile.dev -t metassr-test .

      - name: Upload dist artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundler-dist-output
          path: tests/web-app/dist/
          retention-days: 7
